<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>病人影像归档管理</title>
  <link rel="stylesheet" href="style.css">
  <!-- jsQR 库：用于从图片中解码二维码 -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
  <div class="app">
    <!-- ═══ 侧边栏 ═══ -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="app-brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span class="brand-text">影像归档</span>
        </div>
        <button class="btn btn-primary btn-sm" id="btnAddPatient" title="添加新病人">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          添加病人
        </button>
      </div>

      <div class="sidebar-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索病人姓名或编号…" autocomplete="off">
      </div>

      <div class="patient-list" id="patientList">
        <!-- 动态生成 -->
      </div>

      <div class="sidebar-footer">
        <span class="patient-count" id="patientCount">共 0 位病人</span>
      </div>
    </aside>

    <!-- ═══ 主内容区 ═══ -->
    <main class="main-content" id="mainContent">

      <!-- 欢迎页 -->
      <div class="view" id="viewWelcome">
        <div class="welcome">
          <div class="welcome-icon">
            <svg viewBox="0 0 80 80" fill="none" width="80" height="80">
              <rect x="8" y="8" width="28" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
              <rect x="44" y="8" width="28" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
              <rect x="8" y="44" width="28" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
              <rect x="44" y="44" width="28" height="28" rx="6" fill="#EFF6FF" stroke="#93C3FD" stroke-width="2" stroke-dasharray="4 3"/>
              <line x1="58" y1="52" x2="58" y2="64" stroke="#93C3FD" stroke-width="2"/>
              <line x1="52" y1="58" x2="64" y2="58" stroke="#93C3FD" stroke-width="2"/>
            </svg>
          </div>
          <h2>病人影像归档管理</h2>
          <p class="welcome-desc">
            快速归档病人外院影像二维码，汇报时按病人分门别类展示。<br>
            支持从微信图片导入、剪贴板粘贴、拖拽导入。
          </p>
          <div class="welcome-actions">
            <button class="btn btn-primary" id="btnWelcomeAdd">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              添加第一位病人
            </button>
          </div>
          <div class="welcome-tips">
            <div class="tip">
              <span class="tip-num">1</span>
              <span>添加病人，输入姓名或编号</span>
            </div>
            <div class="tip">
              <span class="tip-num">2</span>
              <span>导入该病人的二维码图片</span>
            </div>
            <div class="tip">
              <span class="tip-num">3</span>
              <span>汇报时点击「汇报展示」一键打开</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 病人详情页 -->
      <div class="view hidden" id="viewPatient">
        <div class="patient-header">
          <div class="patient-header-info">
            <h2 class="patient-name" id="patientName"></h2>
            <div class="patient-meta">
              <span class="patient-id-badge" id="patientIdBadge"></span>
              <span class="patient-date" id="patientDate"></span>
            </div>
          </div>
          <div class="patient-header-actions">
            <button class="btn btn-outline" id="btnImportQR" title="导入二维码图片">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              导入二维码
            </button>
            <button class="btn btn-primary" id="btnPresent" title="打开汇报展示窗口">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
              汇报展示
            </button>
            <button class="btn btn-ghost btn-icon" id="btnEditPatient" title="编辑病人信息">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn btn-ghost btn-icon btn-danger-ghost" id="btnDeletePatient" title="删除病人">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="results-toolbar">
          <div class="results-toolbar-left">
            <span class="results-count" id="resultsCount">0 项影像结果</span>
            <span class="preload-badge hidden" id="preloadBadge"></span>
          </div>
          <div class="results-toolbar-right">
            <button class="btn btn-sm btn-primary hidden" id="btnOpenViews" title="在软件内打开全部影像页面（卡片显示）">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
              打开全部影像
            </button>
            <button class="btn btn-sm btn-outline hidden" id="btnCloseViews" title="关闭全部影像页面">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
              关闭全部
            </button>
            <button class="btn btn-sm btn-outline hidden" id="btnOpenAll" title="在浏览器中打开全部影像链接">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              外部打开
            </button>
          </div>
        </div>

        <!-- 焦点模式工具栏（放大单个影像时显示） -->
        <div class="focus-bar hidden" id="focusBar">
          <button class="btn btn-ghost btn-sm" id="btnFocusBack" title="返回卡片网格">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            返回卡片
          </button>
          <span class="focus-title" id="focusTitle"></span>
          <button class="btn btn-ghost btn-icon" id="btnFocusFullscreen" title="独立窗口打开">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </button>
        </div>

        <div class="patient-body" id="patientBody">
          <!-- 卡片网格（打开全部影像后显示） -->
          <div class="card-grid hidden" id="cardGrid">
            <!-- 动态生成 -->
          </div>

          <!-- 普通结果列表（未打开影像时显示） -->
          <div class="results-list" id="resultsList">
            <!-- 动态生成 -->
          </div>

          <div class="results-empty hidden" id="resultsEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" class="empty-icon">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p>暂无影像结果</p>
            <p class="empty-hint">点击上方「导入二维码」按钮，或拖拽图片到此处</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ═══ 模态框：添加/编辑病人 ═══ -->
  <div class="modal-overlay hidden" id="modalPatient">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalPatientTitle">添加病人</h3>
        <button class="modal-close" id="modalPatientClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="inputPatientName">姓名 <span class="required">*</span></label>
          <input type="text" id="inputPatientName" placeholder="输入病人姓名" maxlength="50" autofocus>
        </div>
        <div class="form-group">
          <label for="inputPatientId">编号</label>
          <input type="text" id="inputPatientId" placeholder="可选，如 001、门诊号等" maxlength="30">
        </div>
        <div class="form-group">
          <label for="inputPatientNote">备注</label>
          <textarea id="inputPatientNote" placeholder="可选，如诊断信息、汇报日期等" rows="3" maxlength="200"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="modalPatientCancel">取消</button>
        <button class="btn btn-primary" id="modalPatientSave">保存</button>
      </div>
    </div>
  </div>

  <!-- ═══ 模态框：导入结果 ═══ -->
  <div class="modal-overlay hidden" id="modalImport">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>导入二维码</h3>
        <button class="modal-close" id="modalImportClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="import-progress" id="importProgress">
          <div class="spinner"></div>
          <p>正在识别二维码…</p>
        </div>
        <div class="import-results hidden" id="importResults">
          <!-- 动态生成 -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="modalImportCancel">关闭</button>
        <button class="btn btn-primary hidden" id="modalImportConfirm">确认导入</button>
      </div>
    </div>
  </div>

  <!-- ═══ 拖拽覆盖层 ═══ -->
  <div class="drop-overlay hidden" id="dropOverlay">
    <div class="drop-content">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>释放以导入二维码图片</p>
      <p class="drop-hint">将自动归属到当前选中的病人</p>
    </div>
  </div>

  <!-- ═══ Toast 通知 ═══ -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="renderer.js"></script>
</body>
</html>
