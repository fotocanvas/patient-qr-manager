<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>汇报展示</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶栏 ───────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: rgba(15,23,42,.9);
      border-bottom: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .header-badge {
      display: inline-flex;
      padding: 3px 12px;
      border-radius: 14px;
      background: rgba(59,130,246,.2);
      color: #93C5FD;
      font-size: 13px;
      font-weight: 600;
    }

    .header-note {
      font-size: 13px;
      color: #94A3B8;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-light {
      background: rgba(255,255,255,.1);
      color: #E2E8F0;
    }
    .btn-light:hover { background: rgba(255,255,255,.18); }

    .btn-blue {
      background: #2563EB;
      color: #fff;
    }
    .btn-blue:hover { background: #1D4ED8; }

    /* ── 内容网格 ───────────────────────── */
    .grid-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .grid-area::-webkit-scrollbar { width: 6px; }
    .grid-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .result-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      overflow: hidden;
      transition: all .2s;
      cursor: pointer;
    }

    .result-card:hover {
      background: rgba(255,255,255,.1);
      border-color: rgba(59,130,246,.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(59,130,246,.15);
      color: #60A5FA;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-title h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .card-title span {
      font-size: 12px;
      color: #94A3B8;
    }

    .card-body {
      padding: 14px 16px;
    }

    .card-url {
      font-size: 12px;
      color: #94A3B8;
      word-break: break-all;
      line-height: 1.6;
      max-height: 58px;
      overflow: hidden;
    }

    .card-footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex;
      justify-content: flex-end;
    }

    .card-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 14px;
      border-radius: 6px;
      background: rgba(59,130,246,.15);
      color: #60A5FA;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all .2s;
    }
    .card-open-btn:hover { background: rgba(59,130,246,.3); }

    /* ── 底部信息栏 ─────────────────────── */
    .footer {
      padding: 10px 28px;
      background: rgba(15,23,42,.9);
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 12px;
      color: #64748B;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── 空状态 ─────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #64748B;
    }

    .empty-state p { margin-top: 12px; font-size: 16px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1 id="patientName">—</h1>
      <span class="header-badge" id="resultCount">0 项影像</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-blue" id="btnOpenAll">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        全部打开
      </button>
      <button class="btn btn-light" id="btnClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        关闭
      </button>
    </div>
  </div>

  <div class="grid-area" id="gridArea">
    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <div class="footer">
    病人影像归档管理 · 汇报展示模式 &nbsp;|&nbsp; 点击卡片可打开对应影像链接
  </div>

  <script>
    let patient = null;

    // 接收来自主进程的病人数据
    window.api.onPresentData((data) => {
      patient = data;
      render();
    });

    function render() {
      if (!patient) return;

      document.getElementById('patientName').textContent = patient.name;
      document.getElementById('resultCount').textContent = `${patient.results.length} 项影像`;

      const grid = document.getElementById('resultsGrid');
      if (patient.results.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p>暂无影像结果</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = patient.results.map((r, i) => `
        <div class="result-card" onclick="openUrl('${encodeURIComponent(r.url)}')">
          <div class="card-header">
            <div class="card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <path d="M14 14h3v3m4-3h-3v3m-4 4h3v-3m4 0h-3v3"/>
              </svg>
            </div>
            <div class="card-title">
              <h3>影像结果 #${i + 1}</h3>
              <span>${formatDate(r.importedAt)}</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-url">${escapeHtml(r.url)}</div>
          </div>
          <div class="card-footer">
            <button class="card-open-btn" onclick="event.stopPropagation();openUrl('${encodeURIComponent(r.url)}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              打开
            </button>
          </div>
        </div>
      `).join('');
    }

    function openUrl(encoded) {
      window.api.openExternal(decodeURIComponent(encoded));
    }

    // 全部打开
    document.getElementById('btnOpenAll').addEventListener('click', () => {
      if (!patient || patient.results.length === 0) return;
      patient.results.forEach((r, i) => {
        setTimeout(() => window.api.openExternal(r.url), i * 400);
      });
    });

    // 关闭
    document.getElementById('btnClose').addEventListener('click', () => {
      window.close();
    });

    // 键盘：F11 全屏，Escape 关闭
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F11') {
        e.preventDefault();
        // 通过 IPC 切换全屏
        document.documentElement.requestFullscreen?.();
      }
      if (e.key === 'Escape') {
        if (document.fullscreenElement) {
          document.exitFullscreen?.();
        } else {
          window.close();
        }
      }
    });

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
  </script>
</body>
</html>
